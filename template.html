<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Briefing</title>
  <link rel="stylesheet" href="https://jon-goldman.github.io/briefings/assets/briefing.css">
</head>
<body>
<div class="header">
  <h1>Daily Briefing</h1>
  <div class="date">Loading…</div>
</div>
<div class="memory-bar">
  <button id="mem-btn" onclick="connectGitHub()">Connect GitHub</button>
  <span id="mem-status"></span>
  <span id="mem-save-indicator"></span>
  <a href="https://github.com/jon-goldman/briefings/blob/main/memory.json" target="_blank" class="mem-gh-link">View memory ↗</a>
</div>
<div class="weather-bar"></div>
<h2>Today at a Glance</h2>
<div class="card glance-section"></div>
<h2>On the Radar</h2>
<div class="card radar-section"></div>
<h2>Inbox</h2>
<div class="card inbox-section"></div>
<section style="display:none">
  <h2>Improvement Idea</h2>
  <div class="improvement improvement-section"></div>
</section>
<h2>Action Items</h2>
<div class="card actions-section"></div>
<script src="https://jon-goldman.github.io/briefings/assets/briefing.js"></script>
<script>
  fetch('data/today.json?_=' + Date.now())
    .then(function(r){return r.json();})
    .then(function(data){if(typeof window.renderBriefing==='function')window.renderBriefing(data);else window._pendingBriefingData=data;})
    .catch(function(e){document.querySelector('.date').textContent='Failed to load.';});
</script>
</body>
</html>
